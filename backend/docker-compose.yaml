services:

  polytweet:
    container_name: polytweet-app
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./out/logs:/out/logs
      - ./docs:/docs
    depends_on:
      db-postgres:
        condition: service_healthy
      cache:
        condition: service_healthy

  db-postgres:
    image: postgres:18.1-bookworm
    container_name: postgres-database
    environment:
     - POSTGRES_USER=${POSTGRES_USER}
     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
     - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db/postgres/data:/var/lib/postgresql  
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always


  db-migrations:
    image: migrate/migrate:v4.19.1
    container_name: postgres-migrations
    volumes:
      - ./migrations:/migrations
    depends_on:
      db-postgres:
        condition: service_healthy

  cache:
    image: redis:8.6.2-trixie
    container_name: redis-cache
    environment:
      - REDIS_USER=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --save 100 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./db/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  swagger:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.26-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    container_name: app-swagger
    volumes:
      - .:/code
