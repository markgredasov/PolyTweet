host: 127.0.0.1:8080
info:
  contact: {}
  title: Poly Twitter Service
  version: "1.0"
paths:
  /dummyLogin:
    post:
      consumes:
      - application/json
      description: 'Выдаёт тестовый JWT для указанной роли (admin / user). Для каждой
        роли возвращается фиксированный UUID пользователя: один и тот же UUID для
        всех запросов с ролью admin и один и тот же UUID для роли user.'
      parameters:
      - description: 'доступны роли: admin, user'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_transport_http.DummyLoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Тестовый токен
          schema:
            $ref: '#/definitions/internal_features_auth_transport_http.DummyLoginDTOResponse'
        "400":
          description: Неверный запрос (недопустимое значение роли)
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Получить тестовый JWT по роли
      tags:
      - Auth
  /login:
    post:
      consumes:
      - application/json
      description: Авторизует пользователя по email и паролю, возвращает JWT. Для
        авторизации в рамках теста - /dummyLogin.
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_transport_http.LoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Успешная авторизация
          schema:
            $ref: '#/definitions/internal_features_auth_transport_http.LoginDTOResponse'
        "401":
          description: Неверные учётные данные
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Авторизация по email и паролю
      tags:
      - Auth
  /posts/{PostId}:
    get:
      consumes:
      - application/json
      description: Ищет пост по ID
      parameters:
      - description: Post ID (UUID)
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        format: uuid
        in: path
        name: PostId
        required: true
        type: string
      - description: Bearer <jwt токен>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Пост найден
          schema:
            $ref: '#/definitions/internal_features_posts_transport_http.GetPostByIdDTOResponse'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "401":
          description: Неверные учетные данные
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "404":
          description: Пост не найден
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Поиск поста по ID
      tags:
      - Posts
  /posts/{PostId}/delete:
    delete:
      consumes:
      - application/json
      description: Удаляет пост, если запрос на удаление исходит от автора поста
      parameters:
      - description: Post ID (UUID)
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        format: uuid
        in: path
        name: PostId
        required: true
        type: string
      - description: Bearer <jwt токен>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Пост успешно удален
          schema:
            $ref: '#/definitions/internal_features_posts_transport_http.DeletePostDTOResponse'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "401":
          description: Неверные учетные данные
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "404":
          description: Пост не найден
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Удаление поста
      tags:
      - Posts
  /posts/all:
    get:
      consumes:
      - application/json
      description: Ищет посты за последние 7 дней с поддержкой пагинации через параметры
        page и pageSize.
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 15
        description: Размер страницы
        in: query
        maximum: 30
        minimum: 1
        name: page_size
        type: integer
      - description: Bearer <jwt токен>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Посты найдены
          schema:
            $ref: '#/definitions/internal_features_posts_transport_http.GetLastWeekPostsDTOResponse'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "401":
          description: Неверные учетные данные
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Поиск постов за последние 7 дней
      tags:
      - Posts
  /posts/create:
    post:
      consumes:
      - application/json
      description: Создает пост длиной <= 280 символов
      parameters:
      - description: parent_id и reply_to необязательные параметры
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_posts_transport_http.CreatePostDTO'
      - description: Bearer <jwt токен>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Пост создан
          schema:
            $ref: '#/definitions/internal_features_posts_transport_http.CreatePostDTOResponse'
        "400":
          description: Неверный запрос или content > 280 символов
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "401":
          description: Неверные учетные данные
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Создание поста
      tags:
      - Posts
  /register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и возвращает его данные.
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_transport_http.RegisterDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Пользователь создан
          schema:
            $ref: '#/definitions/internal_features_auth_transport_http.RegisterDTOResponse'
        "400":
          description: Неверный запрос или email уже занят
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Регистрация пользователя
      tags:
      - Auth
  /users/{UserId}/posts:
    get:
      consumes:
      - application/json
      description: Ищет посты пользователя по ID с поддержкой пагинации через параметры
        page и pageSize.
      parameters:
      - description: User ID (UUID)
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        format: uuid
        in: path
        name: UserId
        required: true
        type: string
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 15
        description: Размер страницы
        in: query
        maximum: 30
        minimum: 1
        name: page_size
        type: integer
      - description: Bearer <jwt токен>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Посты найдены
          schema:
            $ref: '#/definitions/internal_features_posts_transport_http.GetPostByIdDTOResponse'
        "400":
          description: Неверный запрос
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "401":
          description: Неверные учетные данные
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError'
      summary: Поиск постов пользователя
      tags:
      - Posts
swagger: "2.0"
