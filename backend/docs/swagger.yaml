definitions:
  github_com_tryingmyb3st_PolyTweet_internal_core_domain.CustomError:
    properties:
      code:
        enum:
        - INVALID_REQUEST
        - ' INTERNAL_ERROR'
        - ' SCHEDULE_EXISTS'
        - ' SLOT_ALREADY_BOOKED'
        - ' FORBIDEN'
        - ' NOT_FOUND'
        type: string
      message:
        example: invalid request
        type: string
    type: object
  github_com_tryingmyb3st_PolyTweet_internal_core_domain.InternalError:
    properties:
      code:
        enum:
        - INTERNAL_ERROR
        type: string
      message:
        example: internal server error
        type: string
    type: object
  github_com_tryingmyb3st_PolyTweet_internal_core_domain.Pagination:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_tryingmyb3st_PolyTweet_internal_core_domain.Post:
    properties:
      content:
        maxLength: 280
        minLength: 1
        type: string
      created_at:
        type: string
      id:
        type: string
      image_url:
        type: string
      parent_id:
        type: string
      reply_to:
        type: string
      user_id:
        type: string
    required:
    - content
    - id
    - user_id
    type: object
  internal_features_auth_transport_http.DummyLoginDTO:
    properties:
      role:
        example: user
        type: string
    type: object
  internal_features_auth_transport_http.DummyLoginDTOResponse:
    properties:
      token:
        type: string
    type: object
  internal_features_auth_transport_http.LoginDTO:
    properties:
      email:
        example: useremail@gmail.com
        type: string
      password:
        example: supersecretpass
        type: string
    type: object
  internal_features_auth_transport_http.LoginDTOResponse:
